<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Clock body -->
  <circle cx="64" cy="68" r="48" fill="#E53E3E"/>
  <circle cx="64" cy="68" r="44" fill="#FFFFFF"/>
  <circle cx="64" cy="68" r="42" fill="#FFF5F5"/>
  <!-- Clock rim -->
  <circle cx="64" cy="68" r="44" fill="none" stroke="#E53E3E" stroke-width="3"/>
  <!-- Hour markers -->
  <rect x="62" y="28" width="4" height="10" rx="2" fill="#E53E3E"/>
  <rect x="62" y="100" width="4" height="10" rx="2" fill="#E53E3E"/>
  <rect x="22" y="66" width="10" height="4" rx="2" fill="#E53E3E"/>
  <rect x="96" y="66" width="10" height="4" rx="2" fill="#E53E3E"/>
  <!-- Hour hand -->
  <line x1="64" y1="68" x2="64" y2="44" stroke="#2D3748" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="64" y1="68" x2="88" y2="54" stroke="#2D3748" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="64" cy="68" r="3" fill="#E53E3E"/>
  <!-- Alarm bells on top -->
  <circle cx="40" cy="20" r="10" fill="#E53E3E"/>
  <circle cx="88" cy="20" r="10" fill="#E53E3E"/>
  <rect x="56" y="10" width="16" height="6" rx="3" fill="#C53030"/>
  <!-- Urgency lines -->
  <line x1="12" y1="36" x2="4" y2="28" stroke="#E53E3E" stroke-width="3" stroke-linecap="round"/>
  <line x1="8" y1="48" x2="0" y2="46" stroke="#E53E3E" stroke-width="3" stroke-linecap="round"/>
  <line x1="116" y1="36" x2="124" y2="28" stroke="#E53E3E" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="48" x2="128" y2="46" stroke="#E53E3E" stroke-width="3" stroke-linecap="round"/>
  <!-- Motion lines (ringing) -->
  <path d="M26,12 Q20,6 26,0" fill="none" stroke="#E53E3E" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M102,12 Q108,6 102,0" fill="none" stroke="#E53E3E" stroke-width="2.5" stroke-linecap="round"/>
</svg>