<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Post -->
  <rect x="60" y="50" width="8" height="68" rx="2" fill="#8B6F47"/>
  <!-- Sign board -->
  <rect x="20" y="12" width="88" height="48" rx="6" fill="#E53E3E"/>
  <rect x="24" y="16" width="80" height="40" rx="4" fill="#FC8181" opacity="0.3"/>
  <!-- SOLD text -->
  <text x="64" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="26" fill="#FFFFFF" letter-spacing="2">SOLD</text>
  <!-- Decorative bang lines -->
  <line x1="16" y1="20" x2="8" y2="14" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="14" y1="36" x2="4" y2="36" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="112" y1="20" x2="120" y2="14" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="114" y1="36" x2="124" y2="36" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <!-- Ground -->
  <ellipse cx="64" cy="120" rx="20" ry="4" fill="#8B6F47" opacity="0.3"/>
</svg>