<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Circle background -->
  <circle cx="64" cy="64" r="56" fill="#E53E3E"/>
  <circle cx="64" cy="64" r="50" fill="none" stroke="#FC8181" stroke-width="2" opacity="0.5"/>
  <!-- Dollar sign -->
  <text x="48" y="78" font-family="Arial,sans-serif" font-weight="bold" font-size="52" fill="#FFFFFF">$</text>
  <!-- Down arrow -->
  <g transform="translate(78, 40)">
    <rect x="6" y="0" width="12" height="32" rx="2" fill="#FFFFFF"/>
    <polygon points="-2,30 12,50 26,30" fill="#FFFFFF"/>
  </g>
  <!-- Strikethrough line (showing price cut) -->
  <line x1="24" y1="58" x2="72" y2="58" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <!-- Small sparkles -->
  <circle cx="20" cy="20" r="3" fill="#FFD700"/>
  <circle cx="108" cy="20" r="2" fill="#FFD700"/>
  <circle cx="108" cy="108" r="3" fill="#FFD700"/>
</svg>