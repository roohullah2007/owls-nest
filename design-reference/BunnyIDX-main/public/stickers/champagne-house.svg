  <polygon points="20,30 22,24 24,30 30,32 24,34 22,40 20,34 14,32" fill="#FFD700"/>
  <polygon points="100,20 102,14 104,20 110,22 104,24 102,30 100,24 94,22" fill="#FFD700"/>
  <polygon points="50,14 51,10 52,14 56,15 52,16 51,20 50,16 46,15" fill="#FFD700"/>
