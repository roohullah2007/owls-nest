  <circle cx="114" cy="45" r="2" fill="#FFD700"/>
  <circle cx="80" cy="12" r="2" fill="#FFD700"/>
  <!-- Sparkle lines -->
  <line x1="34" y1="18" x2="38" y2="22" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="14" x2="86" y2="18" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="56" x2="116" y2="52" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
