<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Face circle -->
  <circle cx="64" cy="68" r="52" fill="#FBBF24"/>
  <circle cx="64" cy="68" r="48" fill="#F59E0B"/>
  <!-- Left eye -->
  <ellipse cx="44" cy="58" rx="6" ry="7" fill="#92400E"/>
  <!-- Right eye (raised/looking up) -->
  <ellipse cx="84" cy="54" rx="6" ry="7" fill="#92400E"/>
  <!-- Left eyebrow flat -->
  <path d="M32,46 Q44,42 54,46" fill="none" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
  <!-- Right eyebrow raised -->
  <path d="M74,38 Q84,32 96,38" fill="none" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
  <!-- Thinking mouth (wavy/sideways) -->
  <path d="M42,88 Q52,82 62,88 Q72,94 82,88" fill="none" stroke="#92400E" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Thinking hand/chin -->
  <g transform="translate(24, 82)">
    <rect x="0" y="8" width="20" height="16" rx="8" fill="#F6AD55"/>
    <!-- Thumb on chin -->
    <rect x="16" y="0" width="8" height="18" rx="4" fill="#F6AD55"/>
  </g>
  <!-- Thought bubbles -->
  <circle cx="104" cy="28" r="10" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="96" cy="42" r="6" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="92" cy="50" r="3" fill="#FFFFFF" opacity="0.4"/>
</svg>