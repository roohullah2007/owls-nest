<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Document shadow -->
  <rect x="28" y="14" width="76" height="100" rx="4" fill="#CBD5E0" opacity="0.5" transform="translate(3,3)"/>
  <!-- Document -->
  <rect x="28" y="14" width="76" height="100" rx="4" fill="#FFFFFF"/>
  <rect x="28" y="14" width="76" height="100" rx="4" fill="none" stroke="#A0AEC0" stroke-width="2"/>
  <!-- Document lines -->
  <rect x="40" y="28" width="48" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="40" y="38" width="48" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="40" y="48" width="36" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="40" y="58" width="48" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="40" y="68" width="28" height="4" rx="2" fill="#E2E8F0"/>
  <!-- Signature line -->
  <line x1="40" y1="90" x2="80" y2="90" stroke="#A0AEC0" stroke-width="1.5"/>
  <text x="44" y="88" font-family="cursive,serif" font-size="12" fill="#2D3748" opacity="0.7">Signed</text>
  <!-- Big checkmark circle -->
  <circle cx="92" cy="90" r="20" fill="#38A169"/>
  <polyline points="80,90 88,98 104,82" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
