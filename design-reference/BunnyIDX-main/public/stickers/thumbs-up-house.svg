<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Thumbs up hand -->
  <g transform="translate(20, 24)">
    <!-- Fist -->
    <rect x="16" y="44" width="40" height="36" rx="10" fill="#F6AD55"/>
    <!-- Thumb -->
    <rect x="14" y="10" width="14" height="40" rx="7" fill="#F6AD55"/>
    <!-- Finger lines -->
    <line x1="22" y1="54" x2="50" y2="54" stroke="#DD6B20" stroke-width="1.5" opacity="0.4"/>
    <line x1="22" y1="62" x2="50" y2="62" stroke="#DD6B20" stroke-width="1.5" opacity="0.4"/>
    <line x1="22" y1="70" x2="50" y2="70" stroke="#DD6B20" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Tiny house on thumb -->
  <g transform="translate(68, 6)">
    <!-- House body -->
    <rect x="4" y="20" width="32" height="22" rx="2" fill="#5B8DEF"/>
    <!-- Roof -->
    <polygon points="0,22 20,6 40,22" fill="#3B6DD4"/>
    <!-- Door -->
    <rect x="14" y="28" width="10" height="14" rx="1" fill="#2D5ABF"/>
    <!-- Window -->
    <rect x="28" y="26" width="6" height="6" rx="1" fill="#FFF9C4"/>
  </g>
  <!-- Sparkles -->
  <circle cx="112" cy="16" r="3" fill="#FFD700"/>
  <circle cx="118" cy="32" r="2" fill="#FFD700"/>
  <polygon points="104,6 106,2 108,6 112,8 108,10 106,14 104,10 100,8" fill="#FFD700"/>
</svg>